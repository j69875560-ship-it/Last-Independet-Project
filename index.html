<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Facility Finder</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <h1>Smart Facility Finder</h1>
    </header>

    <nav>
      <a href="index.html">Home</a>
      <a href="add.html">Add Place</a>
      <a href="about.html">About</a>
    </nav>

    <main>
      <section>
        <input
          type="text"
          id="searchInput"
          placeholder="Search places (e.g. hospitals)"
        />

        <select id="radius">
          <option value="1000">1 km</option>
          <option value="5000">5 km</option>
          <option value="10000">10 km</option>
        </select>

        <select id="sortBy">
          <option value="distance">Closest</option>
          <option value="rating">Highest Rated</option>
          <option value="reviews">Most Reviewed</option>
        </select>

        <button onclick="searchPlaces()">Search</button>
      </section>

      <section>
        <h2>Find Facilities</h2>

        <select id="sortBy">
          <option value="distance">Closest</option>
          <option value="rating">Highest Rated</option>
          <option value="reviews">Most Reviewed</option>
        </select>

        <button onclick="sortPlaces()">Sort</button>
      </section>

      <section id="map"></section>

      <section>
        <h2>Results</h2>
        <div id="results"></div>
      </section>
    </main>

    <footer>
      <p>© 2026 Smart Finder</p>
    </footer>

    <script src="style.css"></script>

    <script
      async
      src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places&callback=initMap"
    ></script>
  </body>
</html>
